name: AI Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Generate and send to Discord
        run: |
          OUTPUT=$(bun scripts/digest.ts --lang ka --output /dev/stdout 2>&1)
          
          # Format for Discord
          ESCAPED=$(echo "$OUTPUT" | head -c 1900 | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"content\": \"📰 **AI ყოველდღიური სიახლეები**\",
              \"embeds\": [{
                \"title\": \"$(date +'%Y-%m-%d')\",
                \"description\": \"$ESCAPED\",
                \"color\": 5814783,
                \"footer\": {\"text\": \"AI Daily Digest\"}
              }]
            }" "${{ secrets.DISCORD_WEBHOOK_URL }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}