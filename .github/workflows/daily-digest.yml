name: AI Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @google/generative-ai
      - name: Run digest
        run: node digest.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
