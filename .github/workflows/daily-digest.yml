name: AI Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate digest
        run: |
          npm install -g alif-digest
          alif init
          alif run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
