name: AI Daily Digest (TypeScript)

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'საათები (24/48/72)'
        type: number
        default: 24
      top_n:
        description: 'სტატიების რაოდენობა'
        type: number
        default: 15
      lang:
        description: 'ენა'
        type: choice
        options:
          - en
          - ka
        default: ka
  schedule:
    - cron: '0 6 * * *'

permissions:
  issues: write
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create output directory
        run: mkdir -p ./output

      - name: Run AI Daily Digest
        run: |
          bun scripts/digest.ts \
            --hours ${{ github.event.inputs.hours || 24 }} \
            --top-n ${{ github.event.inputs.top_n || 15 }} \
            --lang ${{ github.event.inputs.lang || 'ka' }} \
            --output ./output/digest.md
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './output/digest.md';
            
            if (!fs.existsSync(path)) {
              console.log('Digest file not found');
              return;
            }
            
            let content = fs.readFileSync(path, 'utf8');
            const date = new Date().toLocaleDateString('ka-GE');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📰 AI ყოველდღიური სიახლეები - ${date}`,
              body: content
            });

      - name: Send to Discord
        run: |
          CONTENT=$(cat ./output/digest.md | head -c 1900)
          CONTENT_ESCAPED=$(echo "$CONTENT" | jq -Rs .)
          curl -X POST -H "Content-Type: application/json" \
            -d '{
              "content": "📰 **AI ყოველდღიური სიახლეები**",
              "embeds": [{
                "title": "დღევანდელი ტოპ სიახლეები",
                "description": '"$CONTENT_ESCAPED"',
                "color": 5814783,
                "footer": {"text": "AI Daily Digest"}
              }]
            }' ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: ./output/digest.md
          retention-days: 7
